name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $before = (Get-PSDrive C).Free / 1GB
          $targets = @(
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "C:\Program Files\Microsoft SDKs\Azure",
            "C:\Program Files (x86)\Microsoft SDKs\Azure",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($t in $targets) {
            if ($t -and (Test-Path $t)) { Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $t }
          }
          $after = (Get-PSDrive C).Free / 1GB
          Write-Host ("C: free: {0:N1} GB -> {1:N1} GB" -f $before, $after)

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch PDFium (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/pdfium
          curl -fsSL -o /tmp/pdfium.tgz \
            https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-univ.tgz
          tar -xzf /tmp/pdfium.tgz -C /tmp lib/libpdfium.dylib
          cp /tmp/lib/libpdfium.dylib src-tauri/pdfium/libpdfium.dylib

      - name: Fetch PDFium (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/pdfium | Out-Null
          Invoke-WebRequest -Uri https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.zip -OutFile $env:TEMP\pdfium.zip
          Expand-Archive -Path $env:TEMP\pdfium.zip -DestinationPath $env:TEMP\pdfium -Force
          Copy-Item $env:TEMP\pdfium\bin\pdfium.dll src-tauri\pdfium\pdfium.dll

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DOI Checker ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
